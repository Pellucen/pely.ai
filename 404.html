<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Pely.ai</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  body { background: #0C0C0E; color: #E8E8EC; min-height: 100vh; display: flex; flex-direction: column; }
  nav .nav-logo { color: #E8E8EC; }
  nav .nav-wordmark { color: #E8E8EC; }
  nav.scrolled { background: rgba(12,12,14,0.85); border-bottom-color: rgba(255,255,255,0.06); }
  .error-page {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 120px 24px 80px; position: relative; overflow: hidden;
  }
  .error-content { position: relative; z-index: 2; max-width: 480px; }
  .error-code {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(80px, 15vw, 160px); font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #D0BC8A, #94B0C0, #C49484);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .error-heading {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(24px, 4vw, 36px); font-weight: 600;
    margin-bottom: 16px;
  }
  .error-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; line-height: 1.7;
    color: rgba(240, 236, 228, 0.55);
    margin-bottom: 36px;
  }
  .error-cta {
    display: inline-block; font-family: 'Outfit', sans-serif;
    font-weight: 500; font-size: 16px;
    padding: 14px 36px; border-radius: 12px;
    background: linear-gradient(135deg, #D0BC8A, #C49484);
    color: white; text-decoration: none;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .error-cta:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(208,188,138,0.3);
  }
  .error-orb-1 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: #D0BC8A; top: 20%; left: -10%; opacity: 0.08;
    filter: blur(120px); pointer-events: none;
  }
  .error-orb-2 {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    background: #94B0C0; bottom: 10%; right: -5%; opacity: 0.06;
    filter: blur(100px); pointer-events: none;
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav" aria-label="Main navigation">
  <a href="/" class="nav-logo" aria-label="Pely.ai home">
    <svg width="36" height="36" role="img" aria-label="Pely.ai logo" viewBox="0 0 200 200">
      <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(0 100 100)" stroke="#D0BC8A" stroke-width="5" fill="#D0BC8A" fill-opacity="0.09"/>
      <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(60 100 100)" stroke="#94B0C0" stroke-width="5" fill="#94B0C0" fill-opacity="0.09"/>
      <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(120 100 100)" stroke="#C49484" stroke-width="5" fill="#C49484" fill-opacity="0.09"/>
    </svg>
    <span class="nav-wordmark">pely.ai</span>
  </a>
  <a href="/#contact" class="nav-cta" aria-label="Get in touch — go to contact form">Get in touch</a>
</nav>

<main class="error-page">
  <div class="error-orb-1" aria-hidden="true"></div>
  <div class="error-orb-2" aria-hidden="true"></div>
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-heading">This page doesn't exist.</h1>
    <p class="error-text">The page you're looking for has been moved, deleted, or never existed in the first place. Let's get you back on track.</p>
    <a href="/" class="error-cta">Back to home</a>
  </div>
</main>

<footer class="footer-bottom">
  <span>&copy; 2026 Pely.ai — AI workflow automation, Manchester</span>
  <address class="footer-address">1 St Peter's Square, Manchester, M2 3DE</address>
  <div class="footer-links">
    <a href="mailto:info@pely.ai">info@pely.ai</a>
    <a href="/" aria-label="Back to home page">Home</a>
  </div>
</footer>

<script defer src="/main.js"></script>
</body>
</html>
