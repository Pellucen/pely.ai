<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <radialGradient id="o1" cx="10%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D0BC8A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D0BC8A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o2" cx="90%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#94B0C0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#94B0C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o3" cx="50%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#C49484" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C49484" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B0A070"/>
      <stop offset="50%" stop-color="#1A1A1C"/>
      <stop offset="100%" stop-color="#B0A070"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#F8F6F2"/>

  <!-- Orbs -->
  <circle cx="120" cy="200" r="300" fill="url(#o1)"/>
  <circle cx="1400" cy="100" r="280" fill="url(#o2)"/>
  <circle cx="700" cy="380" r="250" fill="url(#o3)"/>

  <!-- Centre content -->
  <g transform="translate(742, 80) scale(0.4)">
    <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(0 100 100)" stroke="#D0BC8A" stroke-width="6" fill="#D0BC8A" fill-opacity="0.12"/>
    <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(60 100 100)" stroke="#94B0C0" stroke-width="6" fill="#94B0C0" fill-opacity="0.12"/>
    <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(120 100 100)" stroke="#C49484" stroke-width="6" fill="#C49484" fill-opacity="0.12"/>
  </g>

  <text x="792" y="200" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="48" font-weight="600" fill="url(#text-shimmer)" text-anchor="middle" letter-spacing="-0.5">Give every employee</text>
  <text x="792" y="256" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="48" font-weight="600" fill="url(#text-shimmer)" text-anchor="middle" letter-spacing="-0.5">ten pairs of hands</text>

  <text x="792" y="300" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="18" fill="#7A7A84" text-anchor="middle">AI workflow automation, Manchester</text>

  <text x="792" y="375" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="14" fill="#7A7A84" text-anchor="middle" opacity="0.5">pellucen.co.uk</text>
