<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <radialGradient id="orb-gold" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#D0BC8A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D0BC8A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-crystal" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#94B0C0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#94B0C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-sand" cx="60%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#C49484" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C49484" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0C0C0E"/>

  <!-- Orbs -->
  <circle cx="250" cy="120" r="280" fill="url(#orb-gold)"/>
  <circle cx="1350" cy="300" r="250" fill="url(#orb-crystal)"/>
  <circle cx="900" cy="80" r="220" fill="url(#orb-sand)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1584" height="396" fill="url(#dots)"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(120, 148) scale(0.5)">
    <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(0 100 100)" stroke="#D0BC8A" stroke-width="5" fill="#D0BC8A" fill-opacity="0.09"/>
    <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(60 100 100)" stroke="#94B0C0" stroke-width="5" fill="#94B0C0" fill-opacity="0.09"/>
    <rect x="78" y="42" width="44" height="116" rx="12" transform="rotate(120 100 100)" stroke="#C49484" stroke-width="5" fill="#C49484" fill-opacity="0.09"/>
  </g>

  <!-- Text -->
  <text x="230" y="188" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="42" font-weight="600" fill="#E8E8EC" letter-spacing="-0.5">Pellucen</text>
  <text x="230" y="228" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="18" fill="#9A9AA4">AI workflow automation</text>

  <!-- Tagline right side -->
  <text x="1560" y="370" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="14" fill="#9A9AA4" text-anchor="end" opacity="0.6">pellucen.co.uk</text>
</svg>
